<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Qeat.exe | PROTOCOL X: THE FINAL REPOSITORY</title>
    <style>
        :root { --main: #00ff88; --bg: #000800; --panel: rgba(0, 15, 0, 0.98); --danger: #ff3333; --warn: #ffcc00; --text: #aaffaa; }
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: var(--text); font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        #game-container { width: 99vw; height: 98vh; max-width: 1400px; border: 3px solid var(--main); background: var(--panel); display: flex; flex-direction: column; box-shadow: 0 0 100px rgba(0,255,136,0.3); }
        #header { display: grid; grid-template-columns: repeat(6, 1fr); background: #000; border-bottom: 2px solid var(--main); padding: 15px; font-weight: bold; font-size: 13px; color: var(--main); }
        .stat-item { border-right: 1px solid #004400; padding: 0 10px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        #main-layout { flex: 1; display: flex; overflow: hidden; }
        #narrative-engine { flex: 2.5; padding: 40px; overflow-y: auto; border-right: 1px solid #004400; background: linear-gradient(rgba(0,10,0,1), rgba(0,0,0,1)); scrollbar-width: thin; scrollbar-color: var(--main) #000; }
        #interface-side { flex: 1; display: flex; flex-direction: column; background: #000; padding: 20px; }
        .para { margin-bottom: 25px; line-height: 1.8; font-size: 16px; animation: scanline 0.5s ease-out; color: #d0ffd0; }
        .thought { font-style: italic; color: #557755; display: block; margin: 15px 0; border-left: 2px solid #004400; padding-left: 15px; font-size: 14px; }
        .hl { color: #fff; text-shadow: 0 0 10px var(--main); font-weight: bold; }
        #watch-ui { flex: 1; border: 2px solid #004400; border-radius: 20px; padding: 15px; display: flex; flex-direction: column; background: radial-gradient(circle, #001500 0%, #000 100%); margin-bottom: 15px; }
        #map-display { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin: 10px 0; }
        .node { border: 1px solid #111; font-size: 8px; height: 35px; display: flex; align-items: center; justify-content: center; text-align: center; color: #222; }
        .node.active { background: var(--main); color: #000 !important; box-shadow: 0 0 15px var(--main); }
        .node.discovered { border-color: var(--main); color: var(--main); }
        #actions { display: flex; flex-direction: column; gap: 8px; }
        button { background: #001100; border: 1px solid var(--main); color: var(--main); padding: 14px; cursor: pointer; font-family: inherit; font-size: 12px; text-align: left; transition: 0.2s; }
        button:hover { background: var(--main); color: #000; padding-left: 20px; }
        .inv-item { display: inline-block; background: #002200; padding: 2px 8px; margin: 2px; border: 1px solid var(--main); font-size: 10px; }
        @keyframes scanline { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <div class="stat-item">DENEY<br>09-PROT</div>
        <div class="stat-item">HAYATİ<br><span id="hp-disp">100</span>%</div>
        <div class="stat-item">ENERJİ<br><span id="en-disp">100</span>%</div>
        <div class="stat-item">RADYASYON<br><span id="rad-disp">0</span></div>
        <div class="stat-item">ZAMAN<br><span id="time-disp">120:00</span></div>
        <div class="stat-item">KONUM<br><span id="loc-disp">...</span></div>
    </div>

    <div id="main-layout">
        <div id="narrative-engine"><div id="output"></div></div>
        <div id="interface-side">
            <div id="watch-ui">
                <div style="text-align: center; font-size: 10px; color: var(--main); opacity: 0.6;">SYSTEM STATUS: NOMINAL</div>
                <div id="map-display"></div>
                <div id="inv-box" style="font-size: 11px;">BİLGİ BANKASI: <div id="items"></div></div>
            </div>
            <div id="actions"></div>
        </div>
    </div>
</div>

<script>
const GAME = {
    hp: 100, en: 100, rad: 0, time: 120,
    loc: "Hücre", inv: [], discovered: ["Hücre"],
    flags: { cellSearched: false, ventOpened: false, code1: false, code2: false, idRead: false, hasKey: false, hasCrowbar: false, radSuppressed: false },
    rooms: ["Hücre", "Koridor A", "Mutfak", "Revir", "Laboratuvar", "Arşiv", "Güvenlik", "Atölye", "Asansör", "Reaktör", "Klinik", "Yüzey Kapısı"]
};

const DATA = {
    "Hücre": {
        desc: () => `Soğuk beton zemin, bilincinin geri gelişindeki ilk somut his oldu. Hücrenin duvarları, sanki bir akıl hastasının son çırpınışlarıymış gibi duran karmaşık matematiksel formüllerle ve binlerce tırnak iziyle kaplı. Tavandaki tek floresan lamba, can çekişen bir kalp gibi ritmik bir şekilde titreyerek odayı anlık beyaz ışıklara boğuyor. Duvarın köşesinde, <span class='hl'>73</span> rakamı paslı bir çiviyle derine kazınmış. Ağır, zırhlı kapı tamamen mühürlü; ancak havalandırma ızgarasının vidaları zamanın ve rutubetin etkisiyle gevşemiş görünüyor.`,
        thought: "Bu oda benim doğum yerim mi yoksa mezarım mı? Duvarlardaki 73... Onu ben mi yazdım?",
        btn: () => {
            let b = [];
            if (!GAME.flags.cellSearched) b.push({ t: "Duvarları ve Yatağı Detaylıca İncele", f: "action_search_cell" });
            if (!GAME.flags.ventOpened) b.push({ t: "Havalandırma Izgarasını Zorla (Gürültülü)", f: "action_open_vent" });
            if (GAME.flags.ventOpened) b.push({ t: "Karanlık Havalandırma Kanalına Gir", n: "Koridor A" });
            return b;
        }
    },
    "Koridor A": {
        desc: () => `Tünelin sonundan aşağı düştüğünde kendini tesisin ana omurgası olan <span class='hl'>Koridor A</span>'da buldun. Burası, bitmek bilmeyen çıplak kabloların ve sızdıran boruların oluşturduğu endüstriyel bir labirent. Kırmızı acil durum ışıkları, zemindeki toz bulutlarını periyodik bir ritimle aydınlatıyor. Batıda çürümüş yemek kokularının geldiği <span class='hl'>Mutfak</span>, kuzeyde mavi ışıklarla yıkanan <span class='hl'>Laboratuvar</span> ve doğuda ağır çelik kapısıyla <span class='hl'>Güvenlik</span> merkezi uzanıyor.`,
        thought: "Sessizlik... Tesis sanki devasa, uyuyan bir metal canavar gibi.",
        btn: () => [
            { t: "Batı Kanadı: Mutfak ve Yemek Alanı", n: "Mutfak" },
            { t: "Kuzey Kanadı: Laboratuvar Kompleksi", n: "Laboratuvar" },
            { t: "Güney Kanadı: Revir (Tıbbi Bölüm)", n: "Revir" },
            { t: "Doğu Kanadı: Güvenlik İstasyonu", n: "Güvenlik" }
        ]
    },
    "Mutfak": {
        desc: () => `Mutfak alanı tam bir kaosun izlerini taşıyor. Devrilmiş metal masalar ve kırılmış porselenlerin arasında, artık ne olduğu anlaşılamayan biyolojik atıklar var. Havadaki yoğun küf kokusu mide bulandırıcı. Köşede, düşük voltajla titreyen eski bir otomat, tek başına loş bir ışık yayarak hala yaşadığını kanıtlamaya çalışıyor. Buzdolaplarından sızan sıvılar zeminde yapışkan bir tabaka oluşturmuş.`,
        thought: "Burada kimse uzun zamandır yemek yememiş. Otomatta hala işe yarar bir şeyler olabilir.",
        btn: () => [
            { t: "Otomatın Mekanizmasını Karıştır", f: "action_use_vending" },
            { t: "Koridor A'ya Geri Dön", n: "Koridor A" }
        ]
    },
    "Revir": {
        desc: () => `Beyaz fayanslar, kurumuş kan izleri ve terk edilmiş tıbbi cihazlar... Revir, bir iyileşme yerinden çok bir mezbahayı andırıyor. Ameliyat masasının üzerindeki mekanik kollar, sanki hayali bir hastayı hala tutuyormuş gibi havada asılı duruyor. İlaç dolaplarının camları kırılmış olsa da, kilitli alt bölmelerde hala mühürlü kutular olabilir.`,
        thought: "Bu yaralarla özgürlüğe ulaşamam. Vücudumu onarmam lazım.",
        btn: () => {
            let b = [];
            if (GAME.hp < 100) b.push({ t: "Mühürlü Tıbbi Dolapları Araştır", f: "action_search_meds" });
            b.push({ t: "Koridor A'ya Geri Dön", n: "Koridor A" });
            return b;
        }
    },
    "Laboratuvar": {
        desc: () => `Burası insanlığın sınırlarının çiğnendiği yer. Dev silindirik tüplerin içinde, neon mavisi sıvılar içinde asılı duran sentetik bedenler var. Bazılarının kabloları hala kafataslarına bağlı. Odanın ortasındaki ana bilgisayar terminali, tüm odayı loş bir teknolojik ışığa boğuyor. Ekranlarda sürekli akan veriler, 'Deney 09'un nöral senkronizasyon hatalarını gösteriyor.`,
        thought: "Tüpteki yüzler... Neden hepsi bana benziyor? Ben bu makinelerin neresindeyim?",
        btn: () => {
            let b = [];
            if (!GAME.flags.code2) b.push({ t: "Ana Terminale Sız (30 Enerji)", f: "action_hack_lab" });
            b.push({ t: "Arşiv Odasına Geçiş Yap", n: "Arşiv" }, { t: "Koridora Dön", n: "Koridor A" });
            return b;
        }
    },
    "Arşiv": {
        desc: () => `Arşiv odası, fiziksel kağıtların ve manyetik bantların oluşturduğu dev bir mezarlık gibi. Hava o kadar tozlu ki her nefeste ciğerlerin sızlıyor. 'PROJE QEAT' etiketli kalın bir dosya, devrilmiş bir rafın en altında yarı açık bir şekilde duruyor. Buradaki sessizlik, geçmişin ağırlığını omuzlarına yüklüyor.`,
        thought: "Buradaki her kağıt, kim olduğuma dair bir kanıt. Gerçeği öğrenmeye hazır mıyım?",
        btn: () => [
            { t: "Kendi Dosyanı Bul ve Oku (20 Dakika)", f: "action_read_files" },
            { t: "Atölye Girişine Geç", n: "Atölye" },
            { t: "Laboratuvar'a Geri Dön", n: "Laboratuvar" }
        ]
    },
    "Güvenlik": {
        desc: () => `Güvenlik odası, onlarca karıncalı monitörün yaydığı gri bir ışıkla aydınlanıyor. Kameralardan biri hala senin bulunduğun koridoru izliyor. Masanın üzerinde devrilmiş kahve fincanları ve kurumuş nöbet çizelgeleri var. Çekmecelerden birinde, üzerinde 'MASTER' yazan bir manyetik kartın parıltısını fark ediyorsun. Bu kart, tesisin derinliklerindeki kilitli kapıları açabilir.`,
        thought: "Birileri hala bu tesisi izliyor mu, yoksa bu sadece bir hayalet sistem mi?",
        btn: () => {
            let b = [];
            if (!GAME.flags.hasKey) b.push({ t: "Güvenlik Masasını Ara (Master Key)", f: "action_get_key" });
            b.push({ t: "Alt Kat: Reaktör Dairesine İn", n: "Reaktör" }, { t: "Koridor A'ya Dön", n: "Koridor A" });
            return b;
        }
    },
    "Atölye": {
        desc: () => `Paslı makinelerin, preslerin ve yarım bırakılmış robotik parçaların olduğu endüstriyel bir cehennem. Tavandan sarkan zincirler, esintiyle birbirine çarparak metalik bir melodi çalıyor. Bir tezgahın üzerinde duran ağır, dökme demirden bir <span class='hl'>Levye</span>, dijital şifrelerin yetmediği yerde sana yardımcı olabilir.`,
        thought: "Şifreyi bulamazsam bu kapıyı kırmam gerekecek. Bu levye benim tek gerçek dostum olabilir.",
        btn: () => {
            let b = [];
            if (!GAME.flags.hasCrowbar) b.push({ t: "Tezgahtaki Levyeyi Al", f: "action_get_crowbar" });
            b.push({ t: "Asansör Boşluğuna İlerle", n: "Asansör" }, { t: "Arşiv'e Geri Dön", n: "Arşiv" });
            return b;
        }
    },
    "Asansör": {
        desc: () => `Asansör kabini çoktan zemine çakılmış, ancak şafttaki çelik halatlar hala gergin duruyor. Yukarıdan, çok uzaklardan sızan zayıf bir gün ışığı huzmesi var. Bu halatlara tırmanmak intihar gibi görünse de, yüzeye giden en kestirme yol bu.`,
        thought: "Yukarıda güneş var... Ama bu tırmanış beni öldürebilir.",
        btn: () => [
            { t: "Kablolara Tutun ve Tırman (-30 HP)", f: "action_climb" },
            { t: "Atölye'ye Geri Dön", n: "Atölye" }
        ]
    },
    "Reaktör": {
        desc: () => `Tesisin en alt katı, kalbi. Devasa nükleer çekirdek, odayı ürkütücü mor bir ışıkla yıkıyor. Q-Watch saatin çılgınlar gibi ötmeye başladı: <span class='hl'>RADYASYON KRİTİK</span>. Hava o kadar iyonize olmuş ki dişlerinin arasında metalik bir tat hissediyorsun. Kontrol panelindeki uyarı ışıkları bir sızıntı olduğunu haykırıyor.`,
        thought: "Burada durduğum her saniye hücrelerim parçalanıyor. Ya hemen bir şey yapmalıyım ya da kaçmalıyım!",
        btn: () => [
            { t: "Kontrol Panelinden Radyasyonu Baskıla", f: "action_suppress_rad" },
            { t: "Klinik Bölümüne Kaç", n: "Klinik" },
            { t: "Güvenlik Odasına Geri Tırman", n: "Güvenlik" }
        ]
    },
    "Klinik": {
        desc: () => `Burası daha modern ve steril bir bölüm. Deneklerin son muayenelerinin yapıldığı yer olmalı. Ameliyat masaları taze kan lekeleriyle dolu, bu da tesisin çok yakın zamanda 'temizlendiğini' gösteriyor. Duvarlarda 'YÜZEYE ÇIKIŞ' okları belirginleşiyor.`,
        thought: "Çok yaklaştım. Dışarıdaki soğuk havayı şimdiden hissedebiliyorum.",
        btn: () => [
            { t: "Yüzey Kapısına Doğru İlerle", n: "Yüzey Kapısı" },
            { t: "Reaktör Katına Dön", n: "Reaktör" }
        ]
    },
    "Yüzey Kapısı": {
        desc: () => `Yolun sonu. Karşında duran devasa hidrolik kapı, özgürlükle arandaki tek engel. Üzerindeki dijital panelde 'ERİŞİM KODU GEREKLİ' yazısı yanıp sönüyor. Kapının altından ince bir kar tabakası sızmış. Dışarıda esen fırtınanın uğultusu, tesisin metalik gürültüsünü bastırıyor.`,
        thought: "73... ve laboratuvardan öğrendiğim diğer rakam... 51 miydi? Zamanım daralıyor.",
        btn: () => [
            { t: "Kod Paneline 7351 Yaz", f: "action_end_good" },
            { t: "Kapıyı Levye İle Kanırtarak Aç", f: "action_end_bad" },
            { t: "Geri Dön", n: "Koridor A" }
        ]
    }
};

function updateUI() {
    document.getElementById("hp-disp").innerText = GAME.hp;
    document.getElementById("en-disp").innerText = GAME.en;
    document.getElementById("rad-disp").innerText = GAME.rad;
    document.getElementById("time-disp").innerText = `${GAME.time}:00`;
    document.getElementById("loc-disp").innerText = GAME.loc.toUpperCase();
    document.getElementById("items").innerHTML = GAME.inv.map(i => `<span class='inv-item'>${i}</span>`).join("") || "YOK";
    
    const mapDiv = document.getElementById("map-display");
    mapDiv.innerHTML = "";
    GAME.rooms.forEach(r => {
        const node = document.createElement("div");
        node.className = `node ${GAME.loc === r ? 'active' : ''} ${GAME.discovered.includes(r) ? 'discovered' : ''}`;
        node.innerText = GAME.discovered.includes(r) ? r.substring(0,6) : "??";
        mapDiv.appendChild(node);
    });

    if (GAME.loc === "Reaktör" && !GAME.flags.radSuppressed) { GAME.rad += 5; GAME.hp -= 3; }
    if (GAME.hp <= 0) endGame("HAYATİ SİNYAL KESİLDİ. SENTETİK BEDEN ÇEVRİMDIŞI. ÖLDÜN.");
    if (GAME.time <= 0) endGame("ZAMAN TÜKENDİ. TESİS KENDİNİ İMHA ETTİ.");
}

function writeOutput(text, thought) {
    const out = document.getElementById("output");
    out.innerHTML = `<div class='para'>${text}</div><div class='thought'>${thought}</div>`;
    out.scrollTop = 0;
}

function changeScene(room) {
    GAME.loc = room; GAME.time -= 2;
    if(!GAME.discovered.includes(room)) GAME.discovered.push(room);
    writeOutput(DATA[room].desc(), DATA[room].thought);
    renderButtons(DATA[room].btn());
    updateUI();
}

function renderButtons(btns) {
    const box = document.getElementById("actions"); box.innerHTML = "";
    btns.forEach(b => {
        const btn = document.createElement("button");
        btn.innerText = "> " + b.t;
        btn.onclick = () => b.n ? changeScene(b.n) : handleAction(b.f);
        box.appendChild(btn);
    });
}

function handleAction(f) {
    switch(f) {
        case "action_search_cell": 
            GAME.flags.cellSearched = true; GAME.flags.code1 = true; 
            GAME.inv.push("Kod Parçası: 73"); 
            writeOutput("Yatağın altındaki soğuk betona kazınmış 73 rakamını buldun.", "Belleğimdeki bir boşluk doluyor..."); 
            break;
        case "action_open_vent": 
            GAME.flags.ventOpened = true; 
            writeOutput("Izgara büyük bir gürültüyle açıldı, tünelden gelen soğuk hava yüzüne çarptı.", "Kaçış yolu hazır."); 
            break;
        case "action_use_vending": 
            if(GAME.en < 100) { GAME.en = Math.min(100, GAME.en + 30); writeOutput("Otomatın camını kırıp bayat bir enerji içeceği aldın.", "Yapay bir güç hissi..."); }
            else { writeOutput("Daha fazla enerjiye ihtiyacın yok.", "Zaten doluyum."); }
            break;
        case "action_search_meds": 
            GAME.hp = Math.min(100, GAME.hp + 40); 
            writeOutput("Mühürlü bir 'Trauma Kit' buldun ve nano-botları yaralarına enjekte ettin.", "Hücrelerim yenileniyor."); 
            break;
        case "action_hack_lab": 
            if(GAME.en >= 30) { GAME.flags.code2 = true; GAME.en -= 30; GAME.inv.push("Kod Parçası: 51"); writeOutput("Terminalden şifrenin sonunu çektin: 51.", "73-51... Şimdi anlam kazandı."); }
            else { writeOutput("Terminali hacklemek için yeterli enerjin yok.", "Biraz enerji bulmalıyım."); }
            break;
        case "action_read_files": 
            GAME.flags.idRead = true; GAME.time -= 20;
            writeOutput("Dosyada 'DENEK 09: İNSAN BİLİNCİ AKTARILMIŞ SENTETİK' yazıyor.", "Ben sadece bir yazılım mıyım?"); 
            break;
        case "action_get_key": 
            GAME.flags.hasKey = true; GAME.inv.push("Master Key"); 
            writeOutput("Mıknatıslı Master Key kartını çekmeceden aldın.", "Tüm kilitler artık benim."); 
            break;
        case "action_get_crowbar": 
            GAME.flags.hasCrowbar = true; GAME.inv.push("Ağır Levye"); 
            writeOutput("Dökme demirden yapılmış ağır levyeyi kavradın.", "Şifrelerin yetmediği yerde bu var."); 
            break;
        case "action_suppress_rad": 
            GAME.flags.radSuppressed = true; GAME.rad = 0; 
            writeOutput("Soğutma protokollerini başlattın, radyasyon seviyesi düştü.", "Daha rahat nefes alıyorum."); 
            break;
        case "action_climb": 
            GAME.hp -= 30; changeScene("Yüzey Kapısı"); 
            writeOutput("Kablolardan tırmanırken ellerin parçalandı ama yukarı ulaştın.", "Güneş çok yakın..."); 
            break;
        case "action_end_good": 
            if(GAME.flags.code1 && GAME.flags.code2) endGame("GERÇEK SON: 7351 kodunu girdin. Hidrolik kapı tıslayarak açıldı. Kar fırtınası içeri dolarken özgürlüğe ilk adımını attın."); 
            else writeOutput("Hatalı kod! Güvenlik sistemi kilitlendi.", "Eksik bir şeyler var!"); 
            break;
        case "action_end_bad": 
            if(GAME.flags.hasCrowbar) endGame("ZORLU SON: Levyeyi kapının arasına sokup tüm gücünle asıldın. Alarm sesleri arasında kapı açıldı ve dışarı kaçtın!"); 
            else writeOutput("Bu kapıyı zorlamak için bir araç lazım.", "Elle açılacak gibi değil."); 
            break;
    }
    renderButtons(DATA[GAME.loc].btn()); updateUI();
}

function endGame(m) {
    document.body.innerHTML = `<div style='text-align:center; padding:100px; color:var(--main); display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh;'>
        <h1 style='text-shadow: 0 0 20px var(--main);'>${m}</h1>
        <br><button onclick='location.reload()' style='padding:20px; border:2px solid var(--main); background:none; color:var(--main); cursor:pointer;'>SİSTEMİ YENİDEN BAŞLAT</button>
    </div>`;
}

changeScene("Hücre");
</script>
</body>
</html>
